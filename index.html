<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Climate PRO ++</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<h1>🌤️ Climate PRO ++</h1>

<input id="search" placeholder="🔎 Ville..." autocomplete="off" oninput="suggestCities()">
<div id="suggestions" class="suggestions"></div>

<button onclick="searchCity()">🌍</button>
<button onclick="gps()">📍</button>

<!-- MÉTÉO ACTUELLE -->
<div class="card">
🌡️ Température : <span id="temp">--</span>°C<br>
🔥 Ressenti : <span id="feel">--</span>°C<br>
💧 Humidité : <span id="hum">--</span>%<br>
🌬️ Vent : <span id="wind">--</span> 
</div>

<!-- PRÉVISIONS -->
<div class="card">
<h3 id="forecastTitle">📊 Prévisions aujourd’hui</h3>
<small>Températures ressenties personnalisées</small>
<p id="forecast">--</p>
</div>

<!-- DEMAIN -->
<div class="card">
<h3>🔮 Demain (IA) - Températures ressenties</h3>
<p id="tomorrow">--</p>
</div>

<!-- IA CONFORT -->
<div class="card">
<h3>🧠 IA Confort</h3>

<button onclick="feedback('hot')">🥵 Chaud</button>
<button onclick="feedback('ok')">🙂 OK</button>
<button onclick="feedback('cold')">🥶 Froid</button>
  
  <button onclick="resetAI()">♻️ Réinitialiser IA</button>
  
<p id="comfort">--</p>
<p id="ai"></p>
<p id="confidence"></p>
<p id="advice"></p>
</div>

<!-- ALERTES -->
<div class="card">
<h3>🚨 Alertes</h3>
<p id="alert">--</p>
</div>

<script src="app.js"></script>

</body>
</html>
